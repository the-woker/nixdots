palette = "Ashen"

[palettes.Ashen]
color_bg1 = "#CC6EAD"
color_bg2 = "#CC6EAD"
color_bg3 = "#4F2441"
color_bg4 = "#7A0F5E"
color_bg5 = "#7A0F5E"

color_red = "#7A0F5E"

[character]
error_symbol = "[ÔØ»](bold color_red)"
success_symbol = "[ÔØ»](bold #C53030)"


[directory]
style = "bg:color_bg2 fg:#323232"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
style = "bg:color_bg3 fg:#121212"
format = "[$symbol $branch]($style)"

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "´ÆÄ"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
format = '[( $all_status$ahead_behind)]($style)'
style = "bold bg:color_bg3 fg:color_red"

[hostname]
format = "[@$hostname]($style)"
ssh_only = true
ssh_symbol = "¯¼ü "
style = "bg:color_bg1 fg:#f2f2f2"

[os]
format = "[$symbol]($style)"
style = "bg:color_bg1 fg:#323232"
disabled = false

[username]
disabled = false
format = "[$user]($style)"
show_always = true
style_root = "bg:color_bg1 fg:#323232"
style_user = "bg:color_bg1 fg:#323232"

# Code symbols
[c]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#6295CB"
symbol = "¯ÿ× "

[cpp]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#6295CB"
symbol = "¯ÿØ "
disabled = false

[dotnet]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#1180C3"
