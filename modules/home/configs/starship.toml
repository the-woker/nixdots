"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

command_timeout = 1500

format = """
[¯éÂ](fg:color_bg1)\
$os\
$username\
$hostname\
[¯é┤ ](fg:color_bg1 bg:color_bg2)\
$directory\
[¯é┤ ](fg:color_bg2 bg:color_bg3)\
