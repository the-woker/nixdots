$git_status\
[¯é┤ ](fg:color_bg3 bg:color_bg4)\
$c\
$cpp\
$dotnet\
$java\
$kotlin\
$nodejs\
[¯é┤ ](fg:color_bg4 bg:color_bg5)\
[¯é┤ ](fg:color_bg5)\
